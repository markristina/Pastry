<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | La Maria Bakehouse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">
                    <img src="assets/images/logolmb.png" alt="La Maria Bakehouse logo" class="logo-img">
                    <span>La Maria Bakehouse</span>
                </a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="index.html#featured">Menu</a>
                    <a href="index.html#about">About</a>
                    <a href="index.html#contact">Contact Us</a>
                    <a href="login.html" class="active">Login</a>
                    <a href="signup.html" class="btn btn-sm">Sign Up</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Login Form Section -->
    <section class="auth-container">
        <div class="auth-box">
            <h2>Welcome Back</h2>
            <p class="welcome-message">It's sweet to see you again! Your daily dose of happiness is just a click away.</p>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
                <div class="form-footer">
                    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <img src="assets/images/logolmb.png" alt="La Maria Bakehouse logo" class="footer-logo">
                <h3>La Maria Bakehouse</h3>
                <p>&copy; 2026 La Maria Bakehouse. All rights reserved.</p>
                <div class="social-links">
                    <a href="#"><i class="fab fa-instagram"></i> Instagram</a>
                    <a href="#"><i class="fab fa-facebook-f"></i> Facebook</a>
                    <a href="#"><i class="fab fa-twitter"></i> Twitter</a>
                    <a href="mailto:hello@lamariabakehouse.com"><i class="fas fa-envelope"></i> Email</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
